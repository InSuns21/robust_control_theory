<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="470" viewBox="0 0 1280 470">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="1280" height="470" fill="#ffffff"/>
  <text x="40" y="42" font-size="28" font-family="Segoe UI, Arial">直列・並列・フィードバックの基本則</text>

  <text x="50" y="104" font-size="24" font-family="Segoe UI, Arial">直列</text>
  <line x1="140" y1="96" x2="230" y2="96" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="230" y="70" width="120" height="52" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="290" y="103" text-anchor="middle" font-size="24" font-family="Times New Roman, Times, serif">G<tspan baseline-shift="sub" font-size="16">1</tspan></text>
  <line x1="350" y1="96" x2="440" y2="96" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="440" y="70" width="120" height="52" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <text x="500" y="103" text-anchor="middle" font-size="24" font-family="Times New Roman, Times, serif">G<tspan baseline-shift="sub" font-size="16">2</tspan></text>
  <line x1="560" y1="96" x2="650" y2="96" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="740" y="103" font-size="24" font-family="Segoe UI, Arial">等価伝達関数</text>
  <text x="970" y="103" text-anchor="middle" font-size="28" font-family="Times New Roman, Times, serif">G<tspan baseline-shift="sub" font-size="18">1</tspan> G<tspan baseline-shift="sub" font-size="18">2</tspan></text>

  <line x1="40" y1="145" x2="1230" y2="145" stroke="#e2e8f0" stroke-width="2"/>

  <text x="50" y="232" font-size="24" font-family="Segoe UI, Arial">並列</text>
  <line x1="140" y1="220" x2="200" y2="220" stroke="#1f2937" stroke-width="3"/>
  <line x1="200" y1="184" x2="200" y2="256" stroke="#1f2937" stroke-width="3"/>
  <line x1="200" y1="184" x2="250" y2="184" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="200" y1="256" x2="250" y2="256" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="250" y="158" width="120" height="52" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="310" y="191" text-anchor="middle" font-size="24" font-family="Times New Roman, Times, serif">G<tspan baseline-shift="sub" font-size="16">1</tspan></text>
  <rect x="250" y="230" width="120" height="52" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <text x="310" y="263" text-anchor="middle" font-size="24" font-family="Times New Roman, Times, serif">G<tspan baseline-shift="sub" font-size="16">2</tspan></text>
  <line x1="370" y1="184" x2="430" y2="184" stroke="#1f2937" stroke-width="3"/>
  <line x1="370" y1="256" x2="430" y2="256" stroke="#1f2937" stroke-width="3"/>
  <line x1="430" y1="184" x2="430" y2="256" stroke="#1f2937" stroke-width="3"/>
  <circle cx="470" cy="220" r="20" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="470" y="228" text-anchor="middle" font-size="26" font-family="Segoe UI Symbol, Segoe UI, Arial">+</text>
  <line x1="430" y1="220" x2="450" y2="220" stroke="#1f2937" stroke-width="3"/>
  <line x1="490" y1="220" x2="580" y2="220" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="740" y="228" font-size="24" font-family="Segoe UI, Arial">等価伝達関数</text>
  <text x="970" y="228" text-anchor="middle" font-size="28" font-family="Times New Roman, Times, serif">G<tspan baseline-shift="sub" font-size="18">1</tspan> + G<tspan baseline-shift="sub" font-size="18">2</tspan></text>

  <line x1="40" y1="305" x2="1230" y2="305" stroke="#e2e8f0" stroke-width="2"/>

  <text x="50" y="392" font-size="24" font-family="Segoe UI, Arial">負帰還</text>
  <line x1="140" y1="382" x2="220" y2="382" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <circle cx="255" cy="382" r="22" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="255" y="390" text-anchor="middle" font-size="26" font-family="Segoe UI Symbol, Segoe UI, Arial">Σ</text>
  <line x1="277" y1="382" x2="340" y2="382" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="340" y="356" width="120" height="52" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="389" text-anchor="middle" font-size="28" font-family="Times New Roman, Times, serif">G</text>
  <line x1="460" y1="382" x2="550" y2="382" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="520" y1="382" x2="520" y2="438" stroke="#1f2937" stroke-width="3"/>
  <line x1="520" y1="438" x2="255" y2="438" stroke="#1f2937" stroke-width="3"/>
  <line x1="255" y1="438" x2="255" y2="404" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="392" y="416" width="92" height="40" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="438" y="443" text-anchor="middle" font-size="24" font-family="Times New Roman, Times, serif">H</text>
  <text x="740" y="389" font-size="24" font-family="Segoe UI, Arial">等価伝達関数</text>
  <text x="970" y="389" text-anchor="middle" font-size="28" font-family="Times New Roman, Times, serif">G / (1 + G H)</text>
</svg>
