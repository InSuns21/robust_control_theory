<svg xmlns="http://www.w3.org/2000/svg" width="860" height="430" viewBox="0 0 860 430">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="860" height="430" fill="#ffffff"/>

  <rect x="170" y="30" width="520" height="90" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="275" y="66" font-size="24" font-family="Segoe UI, Arial">微分方程式</text>
  <text x="236" y="95" font-size="20" font-family="Segoe UI, Arial">a2 y'' + a1 y' + a0 y = b0 u</text>

  <line x1="430" y1="120" x2="430" y2="165" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="455" y="148" font-size="18" font-family="Segoe UI, Arial">ラプラス変換</text>

  <rect x="150" y="165" width="560" height="110" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="300" y="200" font-size="24" font-family="Segoe UI, Arial">s 領域の式</text>
  <text x="197" y="230" font-size="20" font-family="Segoe UI, Arial">(a2 s^2 + a1 s + a0)Y</text>
  <text x="258" y="258" font-size="20" font-family="Segoe UI, Arial">- 初期値項 = b0 U</text>

  <line x1="430" y1="275" x2="430" y2="320" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="455" y="303" font-size="18" font-family="Segoe UI, Arial">ゼロ初期値で整理</text>

  <rect x="260" y="320" width="340" height="80" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="380" y="354" font-size="24" font-family="Segoe UI, Arial">Y/U</text>
  <text x="350" y="382" font-size="22" font-family="Segoe UI, Arial">有理関数</text>
</svg>
