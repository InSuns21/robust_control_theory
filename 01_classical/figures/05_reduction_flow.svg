<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="300" viewBox="0 0 1280 300">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="1280" height="300" fill="#ffffff"/>
  <text x="48" y="44" font-size="28" font-family="Segoe UI, Arial">ブロック線図簡約の流れ</text>

  <rect x="70" y="118" width="210" height="74" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="175" y="164" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial">直列をまとめる</text>

  <line x1="280" y1="155" x2="390" y2="155" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="390" y="118" width="210" height="74" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="495" y="164" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial">並列をまとめる</text>

  <line x1="600" y1="155" x2="710" y2="155" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="710" y="118" width="230" height="74" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="825" y="164" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial">内側ループを簡約</text>

  <line x1="940" y1="155" x2="1050" y2="155" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="1050" y="118" width="180" height="74" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="1140" y="164" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial">必要なら繰り返す</text>
</svg>
